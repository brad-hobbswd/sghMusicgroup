<header class="site-header" id="siteHeader">

<style>

/* ===== HEADER ===== */
.site-header{
  position:sticky;
  top:0;
  z-index:1000;
  background:#0c0a09;
  border-bottom:1px solid #1f1f1f;
  transition:0.3s;
}

/* ===== SCROLL EFFECT ===== */
.site-header.scrolled{
  padding:5px 0;
  background:#0c0a09e6;
  backdrop-filter:blur(6px);
}

/* ===== NAV ===== */
.nav{
  max-width:1100px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
}

/* ===== LOGO ===== */
.logo{
  font-size:18px;
  font-weight:600;
  color:#fff;
}

/* ===== LINKS ===== */
.nav-links{
  display:flex;
  gap:25px;
}

.nav-links a{
  text-decoration:none;
  color:#bbb;
  font-size:14px;
  position:relative;
}

/* ===== ACTIVE LINK ===== */
.nav-links a.active{
  color:#fff;
}

.nav-links a.active::after{
  content:"";
  position:absolute;
  bottom:-5px;
  left:0;
  width:100%;
  height:2px;
  background:#fff;
}

/* ===== HAMBURGER ===== */
.menu-toggle{
  display:none;
  flex-direction:column;
  cursor:pointer;
}

.menu-toggle span{
  height:2px;
  width:25px;
  background:#fff;
  margin:5px 0;
  transition:0.3s;
}

/* ===== MOBILE ===== */
@media (max-width:768px){

  .menu-toggle{
    display:flex;
  }

  .nav-links{
    position:fixed;
    top:0;
    right:-100%;
    width:70%;
    height:100vh;
    background:#0c0a09;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:25px;
    transition:0.4s;
  }

  .nav-links.active{
    right:0;
  }

}

</style>

<div class="nav">

  <div class="logo">SGH Music Group</div>

  <div class="menu-toggle" id="menuToggle" onclick="toggleMenu()">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="nav-links" id="navLinks">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="team.html">Team</a>
    <a href="radio-releases.html">Radio</a>
    <a href="news.html">News</a>
  </div>

</div>

</header>
